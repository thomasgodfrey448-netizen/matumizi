services:
  - type: web
    name: matoleo-system
    env: python
    plan: free
    rootDir: .
    buildCommand: python -m pip install -r requirements.txt && cd matoleo_system && python manage.py migrate --noinput
    releaseCommand: cd matoleo_system && python manage.py migrate --noinput && python manage.py ensure_admin && python manage.py collectstatic --noinput --clear
    startCommand: cd matoleo_system && python manage.py migrate --noinput && python manage.py ensure_admin && gunicorn matoleo_system.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://matoleo-system.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: matoleo-db
          property: connectionString
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: ADMIN_USERNAME
        value: "admin"
      - key: ADMIN_PASSWORD
        value: "Admin123!@#"
      - key: ADMIN_EMAIL
        value: "admin@example.com"

databases:
  - name: matoleo-db
    plan: free
    databaseName: matoleo_system
    user: matoleo_user
