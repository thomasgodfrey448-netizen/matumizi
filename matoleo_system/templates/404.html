{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | Matumizi System</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f4f6fb; }
    .error-box { text-align: center; background: #fff; border-radius: 16px; padding: 60px 40px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); max-width: 480px; width: 100%; }
    .error-code { font-size: 6rem; font-weight: 800; color: #003366; line-height: 1; }
    .error-title { font-size: 1.5rem; font-weight: 700; margin: 16px 0 8px; color: #222; }
    .error-msg { color: #666; margin-bottom: 32px; }
    .btn-home { background: #003366; color: #fff; padding: 12px 28px; border-radius: 8px; text-decoration: none; font-weight: 600; display: inline-block; }
    .btn-home:hover { background: #004c99; }
  </style>
</head>
<body>
  <div class="error-box">
    <div class="error-code">404</div>
    <div class="error-title">Page Not Found</div>
    <p class="error-msg">The page you are looking for does not exist or has been moved.</p>
    <a href="/" class="btn-home"><i class="fas fa-home" style="margin-right:8px;"></i>Back to Home</a>
  </div>
</body>
</html>
